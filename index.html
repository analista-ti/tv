<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Analista TI - Auto</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
        }
        video { 
            width: 100vw; height: 100vh; 
            object-fit: contain; 
        }
        #status { 
            position: absolute; bottom: 5px; left: 5px; 
            color: rgba(255,255,255,0.2); font-size: 10px; font-family: sans-serif;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="status">Iniciando...</div>

    <video id="player" autoplay muted playsinline preload="auto">
        Seu navegador não suporta vídeos.
    </video>

    <script>
        // ATENÇÃO: Usei o link RAW que aponta direto para o arquivo mp4
        const playlist = [
            'https://raw.githubusercontent.com/analista-ti/tv/main/video1.mp4',
            'https://raw.githubusercontent.com/analista-ti/tv/main/video2.mp4',
            'https://raw.githubusercontent.com/analista-ti/tv/main/video3.mp4',
            'https://raw.githubusercontent.com/analista-ti/tv/main/video4.mp4'
        ];

        let indice = 0;
        const video = document.getElementById('player');
        const status = document.getElementById('status');

        function rodar() {
            if (indice >= playlist.length) indice = 0;
            
            status.textContent = "Reproduzindo: " + (indice + 1);

            // Limpeza de cache obrigatória para Smart TVs
            video.pause();
            video.src = "";
            video.load();

            // Atribui o link direto e toca
            video.src = playlist[indice];
            
            // O navegador da TV LG aceita o .play() sem clique se estiver MUDO (muted)
            video.play().catch(e => {
                status.textContent = "Erro: " + e.message;
            });

            indice++;
        }

        // Quando o vídeo acaba, chama o próximo automaticamente
        video.addEventListener('ended', rodar);

        // Se o link falhar ou a internet oscilar, pula para o próximo
        video.addEventListener('error', () => {
            status.textContent = "Erro no vídeo, pulando...";
            setTimeout(rodar, 2000);
        });

        // Inicia assim que carregar a página
        window.onload = rodar;
    </script>
</body>
</html>
