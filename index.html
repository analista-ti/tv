<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TV Analista TI - Versao Antiga</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        video { width: 100vw; height: 100vh; object-fit: contain; background: #000; }
        #debug { 
            position: absolute; top: 10px; left: 10px; color: #00FF00; 
            font-family: monospace; font-size: 14px; z-index: 100;
            background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #00FF00;
        }
    </style>
</head>
<body>

    <div id="debug">Console de Diagnostico:</div>

    <video id="player" autoplay muted playsinline></video>

    <script>
        // Versao em Javascript Antigo (ES5) para compatibilidade total
        var playlist = [
            'video1.mp4',
            'https://raw.githubusercontent.com/analista-ti/tv/main/video1.mp4',
            'https://www.w3schools.com/html/mov_bbb.mp4'
        ];

        var indice = 0;
        var video = document.getElementById('player');
        var debug = document.getElementById('debug');

        function escreverLog(msg) {
            debug.innerHTML += "<br>> " + msg;
            console.log(msg);
        }

        function rodar() {
            if (indice >= playlist.length) {
                indice = 0;
            }

            var urlAtual = playlist[indice];
            escreverLog("Carregando indice " + indice + ": " + urlAtual);

            video.pause();
            video.src = urlAtual;
            
            // Em TVs antigas usamos o play direto sem Promises
            try {
                video.play();
                escreverLog("Comando PLAY enviado.");
            } catch (e) {
                escreverLog("Erro ao tentar tocar: " + e.message);
            }
        }

        // Eventos escritos no formato antigo
        video.onended = function() {
            escreverLog("Video terminou. Pulando...");
            indice++;
            rodar();
        };

        video.onerror = function() {
            escreverLog("ERRO DE HARDWARE NO ARQUIVO ATUAL.");
            setTimeout(function() {
                indice++;
                rodar();
            }, 4000);
        };

        // Inicia o sistema
        window.onload = function() {
            escreverLog("Sistema Carregado. Iniciando playlist...");
            rodar();
        };
    </script>
</body>
</html>
