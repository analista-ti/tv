<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist TV LG - Final</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; font-family: sans-serif; color: white;
        }
        video { width: 100vw; height: 100vh; object-fit: contain; background: #000; }
        
        .controls { 
            position: absolute; top: 20px; right: 20px; z-index: 10; 
            display: flex; flex-direction: column; gap: 10px; opacity: 1; transition: 0.5s;
        }
        
        .btn { 
            padding: 15px 25px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px;
            background: #cf0652; color: white; font-weight: bold; outline: none;
        }

        #startOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100;
            display: flex; justify-content: center; align-items: center;
        }

        #status { 
            background: rgba(0,0,0,0.6); padding: 8px; border-radius: 4px;
            font-size: 14px; text-align: right; text-shadow: 1px 1px 2px #000;
        }
    </style>
</head>
<body>

    <div id="startOverlay">
        <button class="btn" onclick="iniciarTudo()">CLIQUE PARA INICIAR PLAYLIST</button>
    </div>

    <div class="controls" id="ui-controls">
        <div id="status">Aguardando início...</div>
        <button id="loopBtn" class="btn" style="background: rgba(255,255,255,0.2)">Loop: LIGADO</button>
    </div>

    <video id="videoPlayer" playsinline>
        Seu navegador não suporta vídeos.
    </video>

    <script>
        // 1. LISTA DE VÍDEOS (Certifique-se de que os nomes estão idênticos no GitHub)
        const videosLocais = [
            'video1.mp4',
            'video2.mp4',
            'video3.mp4',
            'video4.mp4'
        ];

        let indiceAtual = 0;
        let repetirPlaylist = true;
        const video = document.getElementById('videoPlayer');
        const statusDisplay = document.getElementById('status');
        const uiControls = document.getElementById('ui-controls');

        function iniciarTudo() {
            document.getElementById('startOverlay').style.display = 'none';
            carregarVideo(0);
        }

        function carregarVideo(index) {
            if (index >= videosLocais.length) return;
            
            statusDisplay.textContent = `Carregando: ${videosLocais[index]}...`;

            // Limpeza de buffer (Crucial para Smart TVs)
            video.pause();
            video.src = ""; 
            video.load();

            // Configuração de carregamento
            video.src = videosLocais[index];
            video.load();

            // Tentativa de Play
            video.play().then(() => {
                statusDisplay.textContent = `Vídeo ${index + 1} de ${videosLocais.length}`;
            }).catch(err => {
                statusDisplay.textContent = "Erro: Use o controle remoto e dê OK no vídeo.";
                console.error(err);
            });
        }

        // Evento de fim de vídeo
        video.addEventListener('ended', () => {
            indiceAtual++;
            if (indiceAtual < videosLocais.length) {
                carregarVideo(indiceAtual);
            } else if (repetirPlaylist) {
                indiceAtual = 0;
                carregarVideo(indiceAtual);
            }
        });

        // Detector de Erros (Se a tela ficar preta, ele avisa o porquê)
        video.addEventListener('error', () => {
            const erro = video.error;
            let msg = "Erro desconhecido";
            if(erro.code === 4) msg = "Formato não suportado pela TV ou link quebrado.";
            if(erro.code === 2) msg = "Erro de rede/internet.";
            
            statusDisplay.textContent = "ERRO: " + msg;
            statusDisplay.style.color = "red";

            // Tenta pular para o próximo em 5 segundos
            setTimeout(() => {
                statusDisplay.style.color = "white";
                indiceAtual++;
                carregarVideo(indiceAtual >= videosLocais.length ? 0 : indiceAtual);
            }, 5000);
        });

        // Alternar modo de repetição
        document.getElementById('loopBtn').addEventListener('click', function() {
            repetirPlaylist = !repetirPlaylist;
            this.textContent = repetirPlaylist ? "Loop: LIGADO" : "Loop: DESLIGADO";
            this.style.background = repetirPlaylist ? "rgba(255,255,255,0.2)" : "#555";
        });

        // Controle de visibilidade da interface
        let timer;
        function mostrarControles() {
            uiControls.style.opacity = '1';
            clearTimeout(timer);
            timer = setTimeout(() => uiControls.style.opacity = '0', 3000);
        }

        document.addEventListener('mousemove', mostrarControles);
        document.addEventListener('click', mostrarControles);

    </script>
</body>
</html>
