<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Analista TI - AutoPlay</title>
    <style>
        /* Estética Limpa: Foco total no vídeo */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; color: white; font-family: sans-serif; 
        }
        video { 
            width: 100vw; height: 100vh; 
            object-fit: contain; 
            background: #000; 
        }
        
        /* Status discreto no canto para diagnóstico */
        #status { 
            position: absolute; top: 10px; right: 10px; 
            background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 15px; 
            font-size: 11px; z-index: 10; opacity: 0.8;
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="status">Iniciando...</div>

    <video id="player" autoplay muted playsinline preload="auto">
        Seu navegador não suporta vídeos.
    </video>

    <script>
        // Lista com os links diretos (RAW) do seu repositório
        const playlist = [
            'https://raw.githubusercontent.com/analista-ti/tv/main/video1.mp4',
            'https://raw.githubusercontent.com/analista-ti/tv/main/video2.mp4',
            'https://raw.githubusercontent.com/analista-ti/tv/main/video3.mp4',
            'https://raw.githubusercontent.com/analista-ti/tv/main/video4.mp4'
        ];

        let indice = 0;
        const video = document.getElementById('player');
        const status = document.getElementById('status');

        function reproduzir(i) {
            // Garante que o índice volte ao zero ao fim da lista (Loop Infinito)
            if (i >= playlist.length) i = 0;
            indice = i;

            status.textContent = `Vídeo ${i + 1} de ${playlist.length}`;

            // 1. Limpeza de memória (Crucial para não travar a Smart TV com o tempo)
            video.pause();
            video.src = "";
            video.load();

            // 2. Carrega o novo vídeo
            video.src = playlist[i];
            
            // 3. Comando de Play
            video.play().catch(e => {
                console.log("Aguardando interação ou erro de codec:", e);
                status.textContent = "Erro no Autoplay. Tente recarregar a página.";
            });
        }

        // Evento: Quando um vídeo termina, chama o próximo
        video.addEventListener('ended', () => {
            reproduzir(indice + 1);
        });

        // Evento: Se o arquivo falhar (link ou formato), pula para o próximo em 3 segundos
        video.addEventListener('error', () => {
            status.textContent = "Erro no vídeo " + (indice + 1) + ". Pulando...";
            setTimeout(() => {
                reproduzir(indice + 1);
            }, 3000);
        });

        // Inicia a playlist assim que o script for carregado
        window.onload = () => {
            reproduzir(0);
        };
    </script>
</body>
</html>
