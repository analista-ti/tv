<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Debug Mode</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        video { width: 100vw; height: 100vh; object-fit: contain; background: #000; }
        #debug { 
            position: absolute; top: 10px; left: 10px; color: lime; 
            font-family: monospace; font-size: 14px; z-index: 100;
            background: rgba(0,0,0,0.7); padding: 10px;
        }
    </style>
</head>
<body>

    <div id="debug">Iniciando sistema...</div>

    <video id="player" autoplay muted playsinline crossorigin="anonymous">
        Seu navegador não suporta vídeos.
    </video>

    <script>
        // Testaremos primeiro com o seu Vídeo 1 e o vídeo do Coelho (que você disse que funcionou)
        // Isso vai nos dizer se o problema é o LINK ou o seu VÍDEO.
        const playlist = [
            'video1.mp4', // Caminho relativo
            'https://raw.githubusercontent.com/analista-ti/tv/main/video1.mp4', // Caminho absoluto
            'https://www.w3schools.com/html/mov_bbb.mp4' // Vídeo de teste que funciona
        ];

        let indice = 0;
        const video = document.getElementById('player');
        const debug = document.getElementById('debug');

        function log(msg) {
            console.log(msg);
            debug.innerHTML += "<br>" + msg;
        }

        function play() {
            if (indice >= playlist.length) indice = 0;
            
            log("Tentando: " + playlist[indice]);
            
            video.pause();
            video.src = playlist[indice];
            video.load();

            let promise = video.play();
            if (promise !== undefined) {
                promise.then(() => {
                    log("REPRODUZINDO OK!");
                }).catch(err => {
                    log("ERRO PLAY: " + err.message);
                });
            }
        }

        video.addEventListener('ended', () => {
            log("Fim do vídeo. Próximo...");
            indice++;
            play();
        });

        video.addEventListener('error', () => {
            let err = video.error;
            let code = err ? err.code : 'Desconhecido';
            log("ERRO DE HARDWARE CODE: " + code);
            log("Dica: Se o coelho rodar e o seu não, seu MP4 precisa ser convertido.");
            
            setTimeout(() => {
                indice++;
                play();
            }, 5000);
        });

        window.onload = play;
    </script>
</body>
</html>
