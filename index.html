<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Analista TI - Autoplay</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
        }
        video { 
            width: 100vw; height: 100vh; 
            object-fit: contain; 
            background: #000; 
        }
    </style>
</head>
<body>

    <video id="player" autoplay muted playsinline preload="auto">
        Seu navegador não suporta vídeos.
    </video>

    <script>
        // Usando o domínio RAW para garantir que a TV acesse o arquivo puro do GitHub
        const playlist = [
            'https://raw.githubusercontent.com/analista-ti/tv/main/video1.mp4',
            'https://raw.githubusercontent.com/analista-ti/tv/main/video2.mp4',
            'https://raw.githubusercontent.com/analista-ti/tv/main/video3.mp4',
            'https://raw.githubusercontent.com/analista-ti/tv/main/video4.mp4'
        ];

        let indice = 0;
        const video = document.getElementById('player');

        function tocarProximo() {
            if (indice >= playlist.length) indice = 0;

            // Limpa o buffer anterior (evita tela preta por falta de memória na TV)
            video.pause();
            video.src = "";
            video.load();

            // Carrega o novo vídeo da lista
            video.src = playlist[indice];
            
            // Força o play (mesmo com o atributo autoplay, o JS garante a troca)
            video.play().catch(e => console.log("Erro ao reproduzir:", e));

            indice++;
        }

        // Quando o vídeo atual termina, chama o próximo
        video.addEventListener('ended', tocarProximo);

        // Se houver erro de rede ou codec, pula para o próximo em 3 segundos
        video.addEventListener('error', () => {
            setTimeout(tocarProximo, 3000);
        });

        // Inicia assim que carregar
        window.onload = tocarProximo;

    </script>
</body>
</html>
