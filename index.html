<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist TV - Analista TI</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: white; font-family: sans-serif; }
        video { width: 100vw; height: 100vh; object-fit: contain; }
        #camadaInicio { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .btn { padding: 20px 40px; font-size: 18px; cursor: pointer; border: none; border-radius: 50px; background: #cf0652; color: white; font-weight: bold; }
        #status { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; font-size: 12px; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>

    <div id="camadaInicio">
        <button class="btn" onclick="iniciar()">CLIQUE PARA INICIAR PLAYLIST</button>
        <p style="margin-top:15px; color:#888;">Necessário para liberar o som na TV</p>
    </div>

    <div id="status">Aguardando...</div>

    <video id="player" playsinline muted>
        Seu navegador não suporta vídeos.
    </video>

    <script>
        // Usei os links diretos (raw) do seu GitHub para evitar bloqueios da TV
        const playlist = [
            'https://raw.githubusercontent.com/analista-ti/tv/main/video1.mp4',
            'https://raw.githubusercontent.com/analista-ti/tv/main/video2.mp4',
            'https://raw.githubusercontent.com/analista-ti/tv/main/video3.mp4',
            'https://raw.githubusercontent.com/analista-ti/tv/main/video4.mp4'
        ];

        let indice = 0;
        const video = document.getElementById('player');
        const status = document.getElementById('status');

        function iniciar() {
            document.getElementById('camadaInicio').style.display = 'none';
            tocar(0);
        }

        function tocar(i) {
            if (i >= playlist.length) i = 0;
            indice = i;

            status.textContent = "Carregando vídeo " + (i + 1);
            
            // Reinicialização agressiva para Smart TV
            video.pause();
            video.src = "";
            video.load();
            
            // Carrega o vídeo real
            video.src = playlist[i];
            
            video.play().then(() => {
                status.textContent = "Reproduzindo vídeo " + (i + 1);
                // Tenta tirar o mudo após o play (algumas TVs permitem, outras não)
                video.muted = false; 
            }).catch(err => {
                status.textContent = "Erro no Play: " + err.message;
            });
        }

        video.addEventListener('ended', () => {
            tocar(indice + 1);
        });

        video.addEventListener('error', () => {
            status.textContent = "ERRO: Formato de vídeo incompatível ou link quebrado.";
            status.style.color = "red";
            setTimeout(() => {
                status.style.color = "white";
                tocar(indice + 1);
            }, 4000);
        });
    </script>
</body>
</html>
