<script>
    // Lista de vídeos
    var playlist = [
        'video1.mp4',
        'video2.mp4',
        'video3.mp4',
        'video4.mp4'
    ];

    var indice = 0;
    var video = document.getElementById('player');

    function reproduzirProximo() {
        // 1. Incrementa o índice PRIMEIRO
        indice++;

        // 2. Se chegou no fim da lista, volta para o zero
        if (indice >= playlist.length) {
            indice = 0;
        }

        // 3. Executa a carga do novo vídeo
        carregarVideoAtual();
    }

    function carregarVideoAtual() {
        // Limpeza profunda para a TV não "viciar" no vídeo anterior
        video.pause();
        video.src = "";
        video.load();

        // Define o link do vídeo atual baseado no índice
        video.src = playlist[indice];
        
        // Tenta dar o play
        try {
            video.play();
            console.log("Reproduzindo indice: " + indice + " (" + playlist[indice] + ")");
        } catch (e) {
            // Se falhar, tenta de novo em 2 segundos
            setTimeout(carregarVideoAtual, 2000);
        }
    }

    // EVENTO DE FIM: Quando o vídeo acaba, chama a função que PULA
    video.onended = function() {
        reproduzirProximo();
    };

    // EVENTO DE ERRO: Se o vídeo travar, pula para o próximo para não parar a TV
    video.onerror = function() {
        setTimeout(function() {
            reproduzirProximo();
        }, 3000);
    };

    // INÍCIO: Quando a página abre, carrega o vídeo 0
    window.onload = function() {
        indice = 0; // Garante que começa no primeiro
        carregarVideoAtual();
    };
</script>
