<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Playlist TV Analista TI</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        video { width: 100vw; height: 100vh; object-fit: contain; background: #000; }
    </style>
</head>
<body>

    <video id="player" autoplay muted playsinline></video>

    <script>
        // Usando var e function tradicional para garantir que a TV não trave
        var playlist = [
            'video1.mp4',
            'video2.mp4',
            'video3.mp4',
            'video4.mp4'
        ];

        var indice = 0;
        var video = document.getElementById('player');

        function reproduzir() {
            if (indice >= playlist.length) {
                indice = 0;
            }

            video.pause();
            // Limpa o src para liberar a memória da TV antes do próximo vídeo
            video.src = "";
            video.load();

            // Define o novo vídeo
            video.src = playlist[indice];
            
            // Tenta o play de forma simples (compatível com WebOS antigo)
            try {
                video.play();
            } catch (e) {
                console.log("Erro ao iniciar");
            }
        }

        // Evento de fim de vídeo
        video.onended = function() {
            indice++;
            reproduzir();
        };

        // Evento de erro (pula para o próximo se o arquivo falhar)
        video.onerror = function() {
            setTimeout(function() {
                indice++;
                reproduzir();
            }, 3000);
        };

        // Inicia assim que a página carregar
        window.onload = function() {
            reproduzir();
        };
    </script>
</body>
</html>
