<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist TV - Analista TI (Mudo/Auto)</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; color: white; font-family: sans-serif; 
        }
        video { 
            width: 100vw; height: 100vh; 
            object-fit: contain; /* Mantém a proporção original */
            background: #000; 
        }
        
        #status { 
            position: absolute; top: 15px; right: 15px; 
            background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 20px; 
            font-size: 12px; z-index: 10; opacity: 0; transition: opacity 0.5s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Botão apenas para o primeiro carregamento */
        #btnIniciar {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; font-size: 18px; cursor: pointer;
            background: #cf0652; color: white; border: none; border-radius: 50px;
            z-index: 100; font-weight: bold;
        }
    </style>
</head>
<body>

    <button id="btnIniciar" onclick="comecar()">INICIAR REPRODUÇÃO</button>
    <div id="status">Carregando...</div>

    <video id="player" muted playsinline preload="auto">
        Seu navegador não suporta vídeos.
    </video>

    <script>
        // Lista com os links diretos do seu GitHub
        const playlist = [
            'https://raw.githubusercontent.com/analista-ti/tv/main/video1.mp4',
            'https://raw.githubusercontent.com/analista-ti/tv/main/video2.mp4',
            'https://raw.githubusercontent.com/analista-ti/tv/main/video3.mp4',
            'https://raw.githubusercontent.com/analista-ti/tv/main/video4.mp4'
        ];

        let indice = 0;
        const video = document.getElementById('player');
        const status = document.getElementById('status');
        const btn = document.getElementById('btnIniciar');

        function comecar() {
            btn.style.display = 'none';
            reproduzir(0);
        }

        function reproduzir(i) {
            if (i >= playlist.length) i = 0;
            indice = i;

            // Log visual rápido
            status.textContent = `Vídeo ${i + 1} de ${playlist.length}`;
            status.style.opacity = "1";

            // Reset de mídia para Smart TV (limpa memória RAM da TV)
            video.pause();
            video.removeAttribute('src');
            video.load();

            // Define nova origem
            video.src = playlist[i];
            
            // Tenta o play (como está mudo, a chance de erro é quase zero)
            video.play().catch(e => {
                console.log("Erro de autoplay:", e);
                status.textContent = "Erro ao reproduzir. Tente novamente.";
            });

            // Esconde o status após 4 segundos
            setTimeout(() => { status.style.opacity = "0"; }, 4000);
        }

        // Próximo vídeo ao terminar
        video.addEventListener('ended', () => {
            reproduzir(indice + 1);
        });

        // Caso o arquivo falhe (link quebrado ou codec ruim)
        video.addEventListener('error', () => {
            status.style.opacity = "1";
            status.textContent = "Erro no arquivo " + (indice + 1) + ". Pulando...";
            setTimeout(() => { reproduzir(indice + 1); }, 3000);
        });

    </script>
</body>
</html>
